services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: technova_frontend
    ports:
      - "8080:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8081
    networks:
      - technova_net
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: technova_backend
    ports:
      - "8081:8000"
    volumes:
      - ./backend/app:/app/app
      - ./eval:/app/eval
      - "./Structured data:/data/structured:ro"
      - "./Unstructured data:/data/unstructured:ro"
      - ./data/db:/data/db
      - hf_cache:/root/.cache/huggingface
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL_NAME=${OPENAI_MODEL_NAME:-gpt-5.4}
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379
      - LANGFUSE_HOST=http://langfuse:3000
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - CUDA_VISIBLE_DEVICES=
    networks:
      - technova_net
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy

  qdrant:
    image: qdrant/qdrant:latest
    container_name: technova_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - technova_net
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: technova_redis
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    networks:
      - technova_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse-db:
    image: postgres:16-alpine
    container_name: technova_langfuse_db
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_pg:/var/lib/postgresql/data
    networks:
      - technova_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse:
    image: langfuse/langfuse:2
    container_name: technova_langfuse
    ports:
      - "8082:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: localdevsecret_please_change
      SALT: localdevsalt
      NEXTAUTH_URL: http://localhost:8082
      TELEMETRY_ENABLED: "false"
      LANGFUSE_INIT_ORG_ID: technova
      LANGFUSE_INIT_ORG_NAME: TechNova
      LANGFUSE_INIT_PROJECT_ID: technova-chatbot
      LANGFUSE_INIT_PROJECT_NAME: TechNova Chatbot
    networks:
      - technova_net
    depends_on:
      langfuse-db:
        condition: service_healthy

networks:
  technova_net:
    driver: bridge

volumes:
  qdrant_storage:
  redis_data:
  langfuse_pg:
  hf_cache:
