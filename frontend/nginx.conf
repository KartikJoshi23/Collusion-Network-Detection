# Demo build: nginx serves the static React build and proxies /api to the api
# service (docs/deployment.md §2). SPA fallback so client routing works.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://api:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_buffering off; # SSE-friendly for the Phase-2 Copilot dock
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
