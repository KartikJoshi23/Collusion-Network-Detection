# §7 step 21 — cross-domain frozen probe, direction procurement -> financial
# (RQ4): GraphSAGE encoder trained on Mendeley's structural channel (relations
# flattened — the shared channel is deliberately homogeneous), frozen; logistic
# probe on Elliptic++ transaction embeddings (train<=34, test>=35).
store_root: data/interim
output_dir: eval_outputs/cross_domain/proc2fin
seed: 0
budgets: [50, 100, 200]

source:
  dataset: mendeley_eu
  store_root: data/interim
  output_dir: eval_outputs/mendeley_eu/gnn_sage_structural_src
  seed: 0
  features: structural
  node_type: firm
  split:
    loss_end: 2010
    train_end: 2013
    test_start: 2014
  model:
    name: graphsage
    hidden_dim: 64
    num_layers: 2
    dropout: 0.3
  loss:
    name: focal
    gamma: 2.0
  lr: 0.01
  weight_decay: 0.0005
  epochs: 300
  patience: 30
  train_label_policy: mendeley_as_of
  budgets: [4, 18, 36]

target:
  dataset: elliptic_pp
  split:
    train_end: 34
    test_start: 35
