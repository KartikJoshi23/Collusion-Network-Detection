# §7 step 10 — M1 baseline sweep, procurement anchor (one YAML = one reproducible run).
# Firm-level queue (award-network signals are firm/buyer-level; §4.2 rule 1).
# WITHIN-SAMPLE framing per the 2026-07-13 decision: the file is a case-control
# research sample (41.9% prevalence), so precision here is not population-style.
# Split: firms by first award year — train ≤2013 (638 firms) / test ≥2014 (363).
dataset: mendeley_eu
domain: procurement
node_type: firm
store_root: data/interim
output_dir: eval_outputs/mendeley_eu/baselines
seed: 0

split:
  train_end: 2013

# §4.5 procurement budgets top 1/5/10% resolved against the 363-firm test queue.
budgets: [4, 18, 36]

baselines: [b1_rules, b2_xgb, b3_xgb_graph, b4_screens]

# B1 — award-tier red flags; percentiles fit on the TRAIN distribution only.
rules:
  - { column: n_awards, direction: high, percentile: 95 } # persistent winner
  - { column: market_share, direction: high, percentile: 95 } # market dominance
  - { column: buyer_hhi, direction: high, percentile: 95 } # single-buyer dependence

# B4 — transparent screen composite (mean of direction-adjusted z-scores).
screens:
  columns: [n_awards, market_share, buyer_hhi]

xgb:
  n_estimators: 400
  max_depth: 6
  learning_rate: 0.1

# audit F1: training/calibration targets use award-derived labels AT train_end
# (the stored labels roll up a firm's entire history); test evaluation keeps
# the stored full-knowledge labels
train_label_policy: mendeley_as_of
