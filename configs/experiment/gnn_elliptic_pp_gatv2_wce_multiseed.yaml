# §7 step 32 — the −focal ablation SETTLED by campaign: the single-seed wce arm
# (0.4869) sat WITHIN the focal multi-seed spread (0.4729 ± 0.0525), so the
# GATv2 loss choice needs its own 5-seed campaign. Protocol byte-identical to
# gnn_elliptic_pp_gatv2_wce.yaml; seeds/aggregation identical to the focal
# campaign config. Machine-class caveat: the focal campaign ran on the
# master hardware class; this campaign's machine is recorded in the ledger —
# ±0.02 machine-class variance (2026-07-18) vs the ±0.05 seed spread.
dataset: elliptic_pp
store_root: data/interim
output_dir: eval_outputs/elliptic_pp/gnn_gatv2_wce_multiseed
multiseed: true
seeds: [0, 1, 2, 3, 4]
features: raw

split:
  loss_end: 29
  train_end: 34
  test_start: 35

model:
  name: gatv2
  hidden_dim: 64
  num_layers: 2
  heads: 4
  dropout: 0.3

loss:
  name: weighted_ce

lr: 0.005
weight_decay: 0.0005
epochs: 200
patience: 20
budgets: [50, 100, 200]

per_time_step: true
