# §7 steps 17+19 — explanation bundles for the top-k Elliptic++ ensemble-queue
# alerts: GNNExplainer (GATv2 checkpoint) on each alert's top member +
# motif matcher + FATF red flags. k ≤ 200 bounds the per-alert budget (§4.4).
dataset: elliptic_pp
domain: financial
store_root: data/interim
alerts: eval_outputs/elliptic_pp/alert_queue_ensemble/alerts.parquet
member_scores: eval_outputs/elliptic_pp/ensemble/scores_ensemble_calibrated.parquet
output_dir: eval_outputs/elliptic_pp/explanations
top_k: 50
seed: 0

supervised_model:
  name: gatv2
  checkpoint: eval_outputs/elliptic_pp/gnn_gatv2_focal/model.pt
  features: raw
  hidden_dim: 64
  num_layers: 2
  heads: 4
  dropout: 0.3
  # §7 step 27 ablation verdict (ledger 2026-07-18): PGExplainer's edges are
  # measurably necessary+sufficient (PyG sanity 49/50 vs GNNExplainer 12/50,
  # 2.4x faster amortized). "gnnexplainer" remains the per-node alternative.
  explainer: pgexplainer

num_hops: 2
explainer_epochs: 100 # used by the gnnexplainer alternative
top_edges: 20
pg:
  train_epochs: 30
  lr: 0.003
