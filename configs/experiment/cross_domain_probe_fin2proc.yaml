# §7 step 21 — cross-domain frozen probe, direction financial -> procurement
# (RQ4): GraphSAGE encoder trained on Elliptic++'s structural channel, frozen;
# logistic probe on Mendeley firm embeddings (train<=2013, test>=2014).
store_root: data/interim
output_dir: eval_outputs/cross_domain/fin2proc
seed: 0
budgets: [4, 18, 36]

source:
  dataset: elliptic_pp
  store_root: data/interim
  output_dir: eval_outputs/elliptic_pp/gnn_sage_structural_src
  seed: 0
  features: structural
  split:
    loss_end: 29
    train_end: 34
    test_start: 35
  model:
    name: graphsage
    hidden_dim: 64
    num_layers: 2
    dropout: 0.3
  loss:
    name: focal
    gamma: 2.0
  lr: 0.005
  weight_decay: 0.0005
  epochs: 200
  patience: 20
  budgets: [50, 100, 200]

target:
  dataset: mendeley_eu
  node_type: firm
  split:
    train_end: 2013
    test_start: 2014
