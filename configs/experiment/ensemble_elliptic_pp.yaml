# §7 steps 14–15 — unsupervised members + fusion on the Elliptic++ test
# window; every member individually reportable (ablation B5). Calibrated
# fusion is primary; rank fusion rides along as the ablation.
dataset: elliptic_pp
store_root: data/interim
output_dir: eval_outputs/elliptic_pp/ensemble
supervised_scores_dir: eval_outputs/elliptic_pp/gnn_gatv2_focal
seed: 0

split:
  loss_end: 29 # validation pool = confirmed nodes in (loss_end, train_end]
  train_end: 34
  test_start: 35

unsupervised:
  edge_type: pays # homogeneous projection (audit F7: explicit, empty = error)
  hid_dim: 32
  epochs: 50

budgets: [50, 100, 200]
