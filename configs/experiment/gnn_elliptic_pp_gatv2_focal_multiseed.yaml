# §7 step 29 — multi-seed (≥5) rerun of the HEADLINE experiment: GATv2-focal
# on Elliptic++ raw features, protocol byte-identical to
# gnn_elliptic_pp_gatv2_focal.yaml (published seed-0 0.5492 on the
# master/laptop-C hardware class; ±0.02 machine-class variance recorded
# 2026-07-18). The seed_0 rerun under this root doubles as a same-machine
# reproduction check. Resumable: completed seeds are never re-trained.
dataset: elliptic_pp
store_root: data/interim
output_dir: eval_outputs/elliptic_pp/gnn_gatv2_focal_multiseed
multiseed: true
seeds: [0, 1, 2, 3, 4]
features: raw

split:
  loss_end: 29
  train_end: 34
  test_start: 35

model:
  name: gatv2
  hidden_dim: 64
  num_layers: 2
  heads: 4
  dropout: 0.3

loss:
  name: focal
  gamma: 2.0

lr: 0.005
weight_decay: 0.0005
epochs: 200
patience: 20
budgets: [50, 100, 200]

per_time_step: true # §4.3 D1: keep the per-step view per seed (step-43 shift)
