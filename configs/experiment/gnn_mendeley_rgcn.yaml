# §7 step 12 — R-GCN on the heterogeneous Mendeley procurement graph
# (awarded/buys_from + reverse relations). Firm-level, within-sample framing
# per the M1 decision; features = shared structural template (procurement
# nodes carry no raw features).
dataset: mendeley_eu
store_root: data/interim
output_dir: eval_outputs/mendeley_eu/gnn_rgcn_focal
seed: 0
features: structural
node_type: firm

split:
  loss_end: 2010
  train_end: 2013
  test_start: 2014

model:
  name: rgcn
  hidden_dim: 64
  num_layers: 2
  dropout: 0.3

loss:
  name: focal
  gamma: 2.0

lr: 0.01
weight_decay: 0.0005
epochs: 300
patience: 30
budgets: [4, 18, 36] # top 1/5/10% of the 363-firm test queue (M1 convention)

# audit F1: training/calibration targets use award-derived labels AT train_end
# (the stored labels roll up a firm's entire history); test evaluation keeps
# the stored full-knowledge labels
train_label_policy: mendeley_as_of
