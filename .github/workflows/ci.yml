# CI skeleton per implementation-plan.md §7 Week 1 / §9:
# lint + typecheck + unit & leakage tests + secret scan + frontend build.
# The frontend job activates automatically once frontend/package.json exists (Week 8).
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run ruff check backend scripts
      - run: uv run black --check backend scripts
      - run: uv run mypy backend/collusiongraph

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run pytest backend/tests -v
      # Leakage tests run inside the suite too; this re-run makes their status
      # visible as a dedicated step (§9.1 — the tests that protect the paper).
      - run: uv run pytest backend/tests -m leakage -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect frontend
        id: fe
        run: echo "exists=$([ -f frontend/package.json ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@v4
        if: steps.fe.outputs.exists == 'true'
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build
        if: steps.fe.outputs.exists == 'true'
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Skip note
        if: steps.fe.outputs.exists != 'true'
        run: echo "frontend/ not scaffolded yet (arrives Week 8) — skipping build"
